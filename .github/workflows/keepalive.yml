name: Keep Render backend awake

on:
  schedule:
    # Every 10 minutes
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping backend /health
        run: |
          set -euo pipefail
          curl -fsS "https://wheres-waldo-backend-jwgd.onrender.com/health" > /dev/null
